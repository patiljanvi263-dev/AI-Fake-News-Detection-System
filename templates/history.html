<!DOCTYPE html>
<html>
<head>
    <title>Prediction History</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

<h1>📜 Prediction History</h1>

<hr>

{% if records %}

<table border="1" cellpadding="10">

<tr>
    <th>News</th>
    <th>Result</th>
    <th>Confidence</th>
    <th>Date</th>
</tr>


{% for row in records %}

<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}%</td>
    <td>{{ row[3] }}</td>
</tr>

{% endfor %}

</table>

{% else %}

<p>No prediction history found.</p>

{% endif %}


<br>

<button onclick="window.location.href='{{ url_for('dashboard') }}'">
    🏠 Back to Dashboard
</button>

</div>

</body>
</html>
