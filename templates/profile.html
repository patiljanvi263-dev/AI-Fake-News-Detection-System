<!DOCTYPE html>
<html>

<head>

<title>Profile</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>


<body>


<div class="container">


<h1>👤 My Profile</h1>

<hr>


{% if user %}

<p><b>Full Name:</b> {{ user[0] }}</p>

<p><b>Email:</b> {{ user[1] }}</p>

<p><b>Username:</b> {{ user[2] }}</p>


{% endif %}


<br>


<button onclick="window.location.href='{{ url_for('dashboard') }}'">
🏠 Back to Dashboard
</button>


</div>


</body>

</html>
